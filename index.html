<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RotorVitals — Bearing Condition Monitoring & Prognostics</title>
    <meta name="description" content="A real rotating-machinery condition-monitoring & prognostics suite: envelope/SES, spectral kurtosis & kurtogram, ISO severity and RUL — open, client-side. Part of the Faena mining-analytics hub." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Pre-paint theme — same localStorage key as the shared shell.
      (function () {
        try {
          var s = localStorage.getItem('caos.theme');
          document.documentElement.dataset.theme = s ? s : matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
